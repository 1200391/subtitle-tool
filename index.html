<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>AI文字起こし</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- 🔐 ロック画面 -->
<div id="lock">
  <h2>パスワード</h2>
  <input type="password" id="pass" placeholder="パスワード">
  <button onclick="unlock()">入る</button>
</div>

<!-- アプリ本体 -->
<div id="app" style="display:none;">

<h1>AI文字起こし</h1>

<button onclick="startRecording()">開始</button>
<button onclick="stopRecording()">終了</button>

<div id="live"></div>

<h2>履歴</h2>
<div id="history"></div>

<h2>検索</h2>
<input id="search">
<button onclick="searchText()">検索</button>

<div id="result"></div>

</div>

<script src="script.js"></script>
</body>
</html>
