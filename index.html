<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>AI文字起こし</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- 🔐 ロック -->
<div id="lock">
  <input type="password" id="pass">
  <button onclick="unlock()">入る</button>
</div>

<div id="app" style="display:none;">

<!-- 🎤 録音 -->
<h2>録音</h2>
<button onclick="startRecording()">開始</button>
<button onclick="stopRecording()">終了</button>
<input id="title" placeholder="タイトル">
<button onclick="saveCurrent()">保存</button>

<div id="live"></div>

<!-- 🔍 検索 -->
<h2>検索</h2>
<input id="search">
<button onclick="searchText()">検索</button>
<div id="result"></div>

<!-- 📜 履歴 -->
<h2>履歴</h2>
<div id="history"></div>

</div>

<!-- 📄 詳細画面 -->
<div id="detailPage" style="display:none;">
  <button onclick="goBack()">← 戻る</button>
  <div id="detailText"></div>
</div>

<script src="script.js"></script>
</body>
</html>
